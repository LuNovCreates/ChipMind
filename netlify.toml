# ── ChipMind — Configuration Netlify ──────────────────────────

[build]
  publish = "."
  # Si tu as une commande de build (npm run build), ajoute-la ici :
  # command = "npm run build"

[functions]
  directory = "netlify/functions"

# ── Redirections SPA (CRUCIAL) ──────────────────────────────
# Redirige toutes les routes vers l'index.html pour laisser la SPA gérer le routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Contextes de Déploiement ────────────────────────────────
[context.production]
  # Variables ou commandes spécifiques pour la v2 (main)
  
[context.deploy-preview]
  # Configuration pour les previews (v3 quand tu feras une PR)
  
[context.branch-deploy]
  # Configuration pour ta branche v3 actuelle

# ── Headers globaux ───────────────────────────────────────────

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/assets/sounds/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/assets/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"