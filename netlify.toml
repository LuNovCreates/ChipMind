# ── ChipMind — Configuration Netlify ──────────────────────────

[build]
  publish = "."

[functions]
  directory = "netlify/functions"

# ── Headers globaux ───────────────────────────────────────────

# Service Worker : autoriser le scope à la racine
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control        = "no-cache"
    Service-Worker-Allowed = "/"

# HTML : jamais mis en cache navigateur (toujours la version fraîche)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# JS / CSS : mis en cache 1 an (immutable — changer le nom si contenu change)
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Sons : mis en cache 1 an
[[headers]]
  for = "/assets/sounds/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Icônes : mis en cache 1 an
[[headers]]
  for = "/assets/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Manifest : court cache (peut changer)
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
